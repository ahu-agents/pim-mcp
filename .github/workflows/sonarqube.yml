name: SonarQube

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Build workspace dependencies' dist (cross-package subpath imports
      # resolve to dist). turbo's `^build` ordering runs via typecheck, the
      # same prerequisite the build-and-test job relies on before `npm test`.
      - name: Build workspace packages
        run: npm run typecheck

      - name: Tests with coverage
        run: npm run test:coverage

      - name: SonarQube Scan
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@v8.1.0
